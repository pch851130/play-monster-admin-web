<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Play Monster 어드민</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <span class="brand">Play Monster 어드민</span>
      <div class="topbar-right">
        <span id="admin-name" class="admin-name"></span>
        <button id="logout" class="btn-ghost" type="button">로그아웃</button>
      </div>
    </header>

    <main class="container">
      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>불러오는 중...</p>
      </div>

      <section id="content" class="content" style="display: none">
        <h2 class="section-title">일자별 포인트 합계</h2>
        <div class="card">
          <form id="point-sum-form" class="filter-bar">
            <label class="field">
              <span>기간(일)</span>
              <select id="ps-day">
                <option value="7">7일</option>
                <option value="15">15일</option>
                <option value="30">30일</option>
              </select>
            </label>
            <label class="field">
              <span>타입</span>
              <select id="ps-type">
                <option value="OFFERWALL">OFFERWALL</option>
                <option value="WELCOME">WELCOME</option>
                <option value="REFERRAL">REFERRAL</option>
                <option value="PAYOUT">PAYOUT</option>
                <option value="DAILY_CHECK">DAILY_CHECK</option>
                <option value="BONUS">BONUS</option>
                <option value="WITHDRAW">WITHDRAW</option>
              </select>
            </label>
            <button type="submit" class="btn-primary">조회</button>
          </form>

          <p id="ps-message" class="hint" style="display: none"></p>

          <table class="info-table" id="ps-table" style="display: none">
            <thead>
              <tr>
                <th>날짜</th>
                <td>포인트 합계</td>
              </tr>
            </thead>
            <tbody id="ps-body"></tbody>
          </table>
        </div>

        <h2 class="section-title" style="margin-top: 28px">출금(PAYOUT) 목록</h2>
        <div class="card">
          <form id="payout-form" class="filter-bar">
            <label class="field">
              <span>상태</span>
              <select id="po-status">
                <option value="PENDING">PENDING</option>
                <option value="COMPLETED">COMPLETED</option>
                <option value="FAILED">FAILED</option>
              </select>
            </label>
            <button type="submit" class="btn-primary">조회</button>
          </form>

          <p id="po-message" class="hint" style="display: none"></p>

          <div class="table-scroll">
            <table class="list-table" id="po-table" style="display: none">
              <thead>
                <tr>
                  <th>날짜</th>
                  <th>포인트</th>
                  <th>상태</th>
                  <th>이름</th>
                  <th>은행</th>
                  <th>계좌번호</th>
                  <th>생년월일</th>
                  <th>실패사유</th>
                  <th>처리</th>
                </tr>
              </thead>
              <tbody id="po-body"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <script src="js/config.js"></script>
    <script src="js/kakao.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
  </body>
</html>
