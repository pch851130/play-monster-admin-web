<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Play Monster 어드민 - 예치금 잔액</title>
    <link rel="icon" type="image/png" href="icon.png?v=20260624" />
    <link rel="stylesheet" href="css/style.css?v=20260624" />
  </head>
  <body>
    <header class="topbar">
      <span class="brand">Play Monster 어드민</span>
      <div class="topbar-right">
        <span id="admin-name" class="admin-name"></span>
        <button id="logout" class="btn-ghost" type="button">로그아웃</button>
      </div>
    </header>

    <main class="container">
      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>불러오는 중...</p>
      </div>

      <div id="content" class="content" style="display: none">
        <nav class="menu">
          <a class="menu-item" href="points.html">일자별 포인트/사용자</a>
          <a class="menu-item" href="payouts.html">출금(PAYOUT) 목록</a>
          <a class="menu-item" href="users.html">사용자 목록</a>
          <a class="menu-item active" href="remit.html">예치금 잔액</a>
        </nav>

        <section class="panel" id="panel-remit">
        <div class="card">
          <h4 class="section-title" style="margin: 0 0 12px">예치금 잔액</h4>
          <div class="filter-bar">
            <button type="button" id="rm-balance-btn" class="btn-primary">잔액 조회</button>
          </div>
          <p id="rm-balance-message" class="hint" style="display: none"></p>
          <table class="info-table" id="rm-balance-table" style="display: none">
            <tbody id="rm-balance-body"></tbody>
          </table>
        </div>
        </section>
      </div>
    </main>

    <script src="js/config.js?v=20260624"></script>
    <script src="js/kakao.js?v=20260624"></script>
    <script src="js/api.js?v=20260624"></script>
    <script src="js/auth.js?v=20260624"></script>
    <script src="js/dashboard.js?v=20260624"></script>
  </body>
</html>
