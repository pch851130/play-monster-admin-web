<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Play Monster 어드민 - 사용자 목록</title>
    <link rel="stylesheet" href="css/style.css?v=20260624" />
  </head>
  <body>
    <header class="topbar">
      <span class="brand">Play Monster 어드민</span>
      <div class="topbar-right">
        <span id="admin-name" class="admin-name"></span>
        <button id="logout" class="btn-ghost" type="button">로그아웃</button>
      </div>
    </header>

    <main class="container">
      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>불러오는 중...</p>
      </div>

      <div id="content" class="content" style="display: none">
        <nav class="menu">
          <a class="menu-item" href="points.html">일자별 포인트/사용자</a>
          <a class="menu-item" href="payouts.html">출금(PAYOUT) 목록</a>
          <a class="menu-item active" href="users.html">사용자 목록</a>
          <a class="menu-item" href="remit.html">예치금 잔액</a>
        </nav>

        <section class="panel" id="panel-users">
        <div class="card">
          <form id="user-search-form" class="filter-bar">
            <label class="field" style="flex: 1; min-width: 200px">
              <span>검색 (이름/휴대폰/추천코드/UUID)</span>
              <input id="us-search" type="text" placeholder="검색어 입력" style="width: 100%" />
            </label>
            <button type="submit" class="btn-primary">검색</button>
          </form>

          <p id="us-message" class="hint" style="display: none"></p>

          <div class="table-scroll">
            <table class="list-table" id="us-table" style="display: none">
              <thead>
                <tr>
                  <th>이름</th>
                  <th>포인트</th>
                  <th>누적출금</th>
                  <th>휴대폰</th>
                  <th>추천코드</th>
                  <th>가입일</th>
                  <th>상세</th>
                </tr>
              </thead>
              <tbody id="us-body"></tbody>
            </table>
          </div>

          <div id="us-pager" class="pager" style="display: none">
            <button type="button" id="us-prev" class="btn-ghost">이전</button>
            <span id="us-page-info" class="admin-name"></span>
            <button type="button" id="us-next" class="btn-ghost">다음</button>
          </div>
        </div>
        </section>
      </div>
    </main>

    <div id="user-modal" class="modal" style="display: none">
      <div class="modal-card">
        <div class="modal-head">
          <h3 class="section-title" style="margin: 0">사용자 상세</h3>
          <button type="button" id="user-modal-close" class="btn-ghost">닫기</button>
        </div>
        <table class="info-table">
          <tbody id="user-detail-body"></tbody>
        </table>

        <h4 class="section-title" style="margin: 20px 0 10px">출금 내역</h4>
        <p id="user-payout-message" class="hint" style="display: none"></p>
        <div class="table-scroll">
          <table class="list-table" id="user-payout-table" style="display: none">
            <thead>
              <tr>
                <th>날짜</th>
                <th>포인트</th>
                <th>상태</th>
                <th>은행</th>
                <th>계좌번호</th>
                <th>실패사유</th>
              </tr>
            </thead>
            <tbody id="user-payout-body"></tbody>
          </table>
        </div>

        <div class="modal-foot">
          <button type="button" id="user-bonus-btn" class="btn-primary">보너스 지급</button>
        </div>
      </div>
    </div>

    <script src="js/config.js?v=20260624"></script>
    <script src="js/kakao.js?v=20260624"></script>
    <script src="js/api.js?v=20260624"></script>
    <script src="js/auth.js?v=20260624"></script>
    <script src="js/dashboard.js?v=20260624"></script>
  </body>
</html>
